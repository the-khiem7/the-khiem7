name: Update Credly Badges

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    env:
      CREDLY_PROFILE_URL: "https://www.credly.com/users/duy-khiem"
      CREDLY_BADGE_LIMIT: ${{ vars.CREDLY_BADGE_LIMIT || '6' }}
      CREDLY_BADGE_FILTER: ${{ vars.CREDLY_BADGE_FILTER || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync Credly badges into README
        run: node scripts/update-credly-badges.mjs

      - name: Commit README changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: update Credly badges"
          git push
